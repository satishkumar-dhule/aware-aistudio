name: Execute Tests
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests'
        required: true
        type: string
        default: 'QA'

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install dependencies
        run: |
          npm ci
          npm i -D @playwright/test
          npx playwright install chromium
          
      - name: Run tests for ${{ inputs.environment }}
        run: |
          TEST_ENV=${{ inputs.environment }} npx playwright test tests/website.spec.ts || true
          TEST_ENV=${{ inputs.environment }} node scripts/process_report_sqlite.cjs
          
      - name: Commit real telemetry
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/telemetry.sqlite
          # Fetch and rebase to prevent conflicts when multiple environments run concurrently
          git pull --rebase origin main || echo "No remote changes"
          git commit -m "chore: auto-update telemetry data for ${{ inputs.environment }} [skip ci]" || echo "No changes"
          git push || echo "Push failed"
