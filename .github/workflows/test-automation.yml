name: Scheduled Fan-Out
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fan-out test execution using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering QA environment tests..."
          gh workflow run "Execute Tests" -f environment=QA
          echo "Triggering UAT environment tests..."
          gh workflow run "Execute Tests" -f environment=UAT
          echo "Triggering Prod environment tests..."
          gh workflow run "Execute Tests" -f environment=Prod
